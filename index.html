<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zakończenia Zygmunta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- SCREEN 1: QUESTIONS -->
  <section id="screen-questions" class="screen active">
    <div class="question-container">
      <p id="question-text" class="question-text"></p>
      <div id="answers-container" class="answers"></div>
    </div>
  </section>

  <!-- SCREEN 2: TAROT CAROUSEL -->
  <section id="screen-tarot" class="screen">
    <h2 class="tarot-heading">Wybierz swoją kartę</h2>
    <div class="carousel-wrapper">
      <button id="btn-prev" class="carousel-btn carousel-btn-prev" aria-label="Poprzednia">&lsaquo;</button>
      <div class="carousel">
        <div class="carousel-card" data-slot="0">
          <img src="" alt="Karta tarota">
        </div>
        <div class="carousel-card" data-slot="1">
          <img src="" alt="Karta tarota">
        </div>
        <div class="carousel-card" data-slot="2">
          <img src="" alt="Karta tarota">
        </div>
      </div>
      <button id="btn-next" class="carousel-btn carousel-btn-next" aria-label="Następna">&rsaquo;</button>
    </div>
    <p class="tarot-hint">Kliknij środkową kartę, aby poznać zakończenie</p>
  </section>

  <!-- SCREEN 3: ENDING (image variant) -->
  <section id="screen-ending-image" class="screen">
    <div class="ending-image-layout">
      <div class="ending-image-col">
        <img id="ending-img" src="" alt="Ilustracja zakończenia">
      </div>
      <div class="ending-text-col">
        <p id="ending-image-type" class="ending-type"></p>
        <h2 id="ending-image-title" class="ending-title"></h2>
        <p id="ending-image-text" class="ending-text"></p>
        <button class="btn-again">AGAIN?</button>
      </div>
    </div>
  </section>

  <!-- SCREEN 4: ENDING (video variant) -->
  <section id="screen-ending-video" class="screen">
    <video id="ending-video" class="ending-video-bg" autoplay loop muted playsinline></video>
    <div class="ending-video-overlay">
      <p id="ending-video-type" class="ending-type"></p>
      <h2 id="ending-video-title" class="ending-title"></h2>
      <p id="ending-video-text" class="ending-text"></p>
      <button class="btn-again">AGAIN?</button>
    </div>
  </section>

  <!-- ZOOM OVERLAY (used during card pick transition) -->
  <div id="zoom-overlay" class="zoom-overlay">
    <img id="zoom-card-img" src="" alt="">
  </div>

  <script src="texts/Pursue-ending.js"></script>
  <script src="texts/Ninth-gate-ending.js"></script>
  <script src="texts/Alistair-McKinnon-ending.js"></script>
  <script src="texts/Lina-Keller-ending.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
